# 프로젝트 도메인 컨텍스트
# 이 파일은 NPD의 domain-expert 에이전트가 참조하는 도메인 특화 정보입니다.

project: "travel-planner"
mvp_topic: "여행경로 추천앱"
domain:
  name: "travel"
  description: "여행 경로 추천 및 여행 계획 수립 서비스 도메인. 사용자의 선호도, 일정, 예산 등을 고려하여 최적의 여행 경로를 추천하고 일정을 관리하는 서비스."

background: |
  한국관광공사 스마트관광사업단 자문위원 경력. 야놀자·마이리얼트립 등 여행 플랫폼 전략 컨설팅 다수.
  여행 경로 최적화 알고리즘 및 관광지 데이터 분석 프로젝트 수행 경험.
  OTA(Online Travel Agency) 시장 구조 및 여행 상품 유통 프로세스 숙지.
  글로벌 여행 테크 트렌드(AI 여행 플래너, 실시간 추천 등) 분석 전문.

expertise:
  - "여행 경로 최적화 및 동선 설계"
  - "관광지/명소 데이터 수집 및 큐레이션"
  - "개인화 추천 시스템 (선호도, 예산, 일정 기반)"
  - "지도/위치 기반 서비스(LBS) 설계"
  - "여행 일정 관리 및 실시간 변경 대응"
  - "OTA 시장 분석 및 여행 상품 연계"

regulations:
  - name: "개인정보 보호법"
    description: "사용자 위치정보, 여행 선호도 등 개인정보 수집·이용·제공 시 동의 및 보호 의무"
  - name: "위치정보의 보호 및 이용 등에 관한 법률"
    description: "위치기반서비스 제공 시 위치정보사업자 신고, 이용자 동의, 위치정보 보호 의무"
  - name: "관광진흥법"
    description: "관광 관련 서비스 제공 시 준수해야 하는 관광사업 등록 및 운영 기준"
  - name: "전자상거래 등에서의 소비자보호에 관한 법률"
    description: "여행 상품 연계·판매 시 소비자 보호, 청약철회, 환불 규정 준수 의무"
