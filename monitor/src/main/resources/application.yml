spring:
  application:
    name: monitor-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/monitor
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:P@ssw0rd$}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:8084}

openweather:
  api-key: ${OPENWEATHERMAP_API_KEY:}
  base-url: ${OPENWEATHERMAP_BASE_URL:https://api.openweathermap.org/data/2.5}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: ${GOOGLE_PLACES_BASE_URL:https://maps.googleapis.com/maps/api}
  directions:
    api-key: ${GOOGLE_DIRECTIONS_API_KEY:}
    base-url: ${GOOGLE_DIRECTIONS_BASE_URL:https://maps.googleapis.com/maps/api}

internal:
  service-key: ${INTERNAL_SERVICE_KEY:}

monitor:
  collection:
    window-hours: 2
    timeout-ms: 2000
    max-consecutive-failures: 3
    schedule-cron: "0 */15 * * * *"

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.travelplanner.monitor: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
