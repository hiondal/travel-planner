spring:
  application:
    name: monitor
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/monitor
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:P@ssw0rd$}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: ${SHOW_SQL:true}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      database: 4

server:
  port: 8084

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: ${GOOGLE_PLACES_BASE_URL:https://maps.googleapis.com/maps/api}
  directions:
    api-key: ${GOOGLE_DIRECTIONS_API_KEY:}
    base-url: ${GOOGLE_DIRECTIONS_BASE_URL:https://maps.googleapis.com/maps/api}

openweathermap:
  api-key: ${OPENWEATHERMAP_API_KEY:}
  base-url: ${OPENWEATHERMAP_BASE_URL:https://api.openweathermap.org/data/2.5}

azure:
  app-config:
    endpoint: ${AZURE_APP_CONFIG_ENDPOINT:}
    connection-string: ${AZURE_APP_CONFIG_CONNECTION_STRING:}

resilience4j:
  circuitbreaker:
    instances:
      external-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.travelplanner: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
