spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/payment
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:P@ssw0rd$}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: ${SHOW_SQL:true}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      database: 7

server:
  port: ${SERVER_PORT:8087}

jwt:
  secret: ${JWT_SECRET:}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

iap:
  apple:
    bundle-id: ${APPLE_BUNDLE_ID:}
    shared-secret: ${APPLE_SHARED_SECRET:}
    environment: ${APPLE_IAP_ENVIRONMENT:sandbox}
  google:
    package-name: ${GOOGLE_PACKAGE_NAME:}
    credentials-path: ${GOOGLE_PLAY_CREDENTIALS_PATH:}

internal:
  service-key: ${INTERNAL_SERVICE_KEY:}

auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}

resilience4j:
  circuitbreaker:
    instances:
      iap-verification:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.travelplanner: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/payment.log}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROLLING_FILE_PATTERN:logs/payment.%d{yyyy-MM-dd}.%i.log}
      max-file-size: ${LOG_MAX_FILE_SIZE:100MB}
      max-history: ${LOG_MAX_HISTORY:30}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
