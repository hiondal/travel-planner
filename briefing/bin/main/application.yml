spring:
  application:
    name: briefing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/briefing
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:P@ssw0rd$}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

server:
  port: ${SERVER_PORT:8085}

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-32chars}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:1800}

monitor-service:
  base-url: ${MONITOR_SERVICE_URL:http://localhost:8084}

payment-service:
  base-url: ${PAYMENT_SERVICE_URL:http://localhost:8087}

place-service:
  base-url: ${PLACE_SERVICE_URL:http://localhost:8083}

internal:
  service-key: ${INTERNAL_SERVICE_KEY:}

briefing:
  free-tier-daily-limit: 1

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.travelplanner.briefing: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/briefing.log}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROLLING_FILE_PATTERN:logs/briefing.%d{yyyy-MM-dd}.%i.log}
      max-file-size: ${LOG_MAX_FILE_SIZE:100MB}
      max-history: ${LOG_MAX_HISTORY:30}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
