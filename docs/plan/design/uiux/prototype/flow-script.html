<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner - 사용자 플로우 스크립트</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --bg-card: #1A1A1A;
      --bg-card-hover: #242424;
      --bg-active: #2A1A1A;
      --text-primary: #F0F0F0;
      --text-secondary: #8A8A8A;
      --text-dim: #555;
      --accent-red: #FF2D2D;
      --accent-blue: #4A9EFF;
      --accent-green: #34C759;
      --accent-yellow: #FFD60A;
      --accent-purple: #BF5AF2;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .top-bar__title {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar__title span { color: var(--accent-red); }
    .top-bar__info {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar__keys kbd {
      background: #333;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin: 0 2px;
      border: 1px solid #444;
    }

    /* ── Flow Tabs ── */
    .flow-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 24px;
      background: #111;
      border-bottom: 1px solid #222;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .flow-tab {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .flow-tab:hover { background: var(--bg-card); color: var(--text-primary); }
    .flow-tab.active {
      background: var(--accent-red);
      color: #fff;
      border-color: var(--accent-red);
    }
    .flow-tab .tab-num {
      display: inline-block;
      width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      font-size: 11px;
      margin-right: 6px;
    }

    /* ── Main Layout ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left: Step List ── */
    .step-list {
      width: 280px;
      flex-shrink: 0;
      background: #111;
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 16px 0;
    }
    .step-list__header {
      padding: 0 16px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .step-item:hover { background: var(--bg-card); }
    .step-item.active { background: var(--bg-active); }
    .step-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-red);
      border-radius: 0 2px 2px 0;
    }
    .step-item__num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      background: #2A2A2A;
      color: var(--text-secondary);
      border: 1px solid #333;
    }
    .step-item.active .step-item__num {
      background: var(--accent-red);
      color: #fff;
      border-color: var(--accent-red);
    }
    .step-item.visited .step-item__num {
      background: #1A2A1A;
      color: var(--accent-green);
      border-color: #2A3A2A;
    }
    .step-item__text { flex: 1; min-width: 0; }
    .step-item__name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step-item__action {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Arrow between steps */
    .step-arrow {
      display: flex;
      align-items: center;
      padding: 2px 0 2px 22px;
      color: var(--text-dim);
      font-size: 11px;
      gap: 6px;
    }
    .step-arrow svg { flex-shrink: 0; }
    .step-arrow span {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Center: Screenshot ── */
    .screen-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      background: #080808;
    }
    .phone-frame {
      width: 375px;
      height: 700px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #333;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      position: relative;
      background: var(--bg);
    }
    .phone-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }
    .phone-frame .no-img {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* Nav Buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid #333;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .nav-btn:hover { background: var(--bg-card-hover); border-color: var(--accent-red); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; border-color: #333; }
    .nav-btn--prev { left: 24px; }
    .nav-btn--next { right: 24px; }

    /* ── Right: Description ── */
    .desc-panel {
      width: 320px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid #222;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .desc-panel__screen-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-red);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .desc-panel__screen-name {
      font-size: 22px;
      font-weight: 700;
      margin-top: 4px;
    }
    .desc-panel__divider {
      height: 1px;
      background: #222;
    }
    .desc-panel__section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .desc-panel__narration {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .desc-panel__narration strong { color: var(--text-primary); font-weight: 600; }
    .desc-panel__action-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: #1A1A2A;
      color: var(--accent-blue);
      border: 1px solid #2A2A3A;
    }
    .desc-panel__action-badge svg { flex-shrink: 0; }
    .desc-panel__next-screen {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid #2A2A2A;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      color: var(--text-primary);
    }
    .desc-panel__next-screen:hover {
      border-color: var(--accent-red);
      background: var(--bg-card-hover);
    }
    .desc-panel__next-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    /* ── Bottom: Progress ── */
    .progress-bar {
      height: 3px;
      background: #222;
      flex-shrink: 0;
    }
    .progress-bar__fill {
      height: 100%;
      background: var(--accent-red);
      transition: width 0.3s;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .desc-panel { width: 260px; }
      .step-list { width: 240px; }
    }
    @media (max-width: 900px) {
      .step-list { display: none; }
    }
    @media (max-width: 700px) {
      .desc-panel { display: none; }
      .phone-frame { width: 300px; height: 560px; }
    }
  </style>
</head>

<!-- Top Bar -->

<!-- Main -->

  <!-- Screenshot (Center) -->

    </button>

    <div class="phone-frame" id="phoneFrame">
      <img id="screenImg" src="" alt="화면 스크린샷">
    </div>

    <button class="nav-btn nav-btn--next" id="btnNext" onclick="goStep(1)" aria-label="다음">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Description (Right) -->
  <div class="desc-panel" id="descPanel"></div>
</div>

<!-- Progress -->
<div class="progress-bar"><div class="progress-bar__fill" id="progressFill"></div></div>

        nextLabel: '장소 추가 →'
      },
      {

      {

        narration: '장소를 일정에 추가하기 전 <strong>방문 날짜와 시간</strong>을 지정합니다. 해당 장소의 영업시간 외 시간을 선택하면 <strong>경고 메시지</strong>가 표시되어 실수를 방지합니다.',

        narration: '새로 추가된 장소가 <strong>타임라인에 반영</strong>됩니다. AI가 자동으로 이동 경로와 시간을 계산하여 기존 일정과의 <strong>최적 배치</strong>를 조정합니다.',
        nextLabel: null
      }
    ]
  },
  {
    id: 'settings',
    name: '설정 & 구독',
    icon: '&#9881;',
    steps: [
      {
        screen: '01', file: '01-일정표', name: '일정표 (메인)',
        action: '하단 "마이" 탭 탭',
        narration: '하단 네비게이션의 <strong>"마이" 탭</strong>을 탭하여 개인 설정 화면으로 이동합니다.',
        nextLabel: '마이 탭 →'
      },
      {
        screen: '10', file: '10-마이페이지', name: '마이페이지',
        action: '"구독 관리" 메뉴 탭',
        narration: '마이페이지에서 <strong>프로필 정보, 구독 상태, 알림 설정, 위치정보 동의</strong> 등을 관리합니다. 현재 Free 플랜으로 표시되며, <strong>"구독 관리"</strong>를 탭하여 업그레이드를 진행합니다.',
        nextLabel: '구독 관리 →'
      },
      {
        screen: '09', file: '09-Paywall', name: 'Paywall (구독)',
        action: '원하는 플랜 선택',
        narration: '<strong>두 가지 유료 플랜</strong>이 제공됩니다.<br><br>&#10095; <strong>Trip Pass</strong> (7,900원/건) — 여행 1건 전체 기능<br>&#10095; <strong>Pro</strong> (4,900원/월) — 무제한 여행 + 프리미엄 기능<br><br>각 플랜의 기능 비교표로 <strong>합리적 선택</strong>을 유도합니다.',
        nextLabel: null
      }
    ]
  }
];

// ─── State ───
var currentFlowIdx = 0;
var currentStepIdx = 0;
var visitedSteps = {};

// ─── Render ───
function renderFlowTabs() {
  var html = '';
  FLOWS.forEach(function(flow, idx) {
    html += '<div class="flow-tab' + (idx === currentFlowIdx ? ' active' : '') +
      '" onclick="switchFlow(' + idx + ')">' +
      '<span class="tab-num">' + (idx + 1) + '</span>' +
      flow.icon + ' ' + flow.name + '</div>';
  });
  document.getElementById('flowTabs').innerHTML = html;
}

function renderStepList() {
  var flow = FLOWS[currentFlowIdx];
  var html = '<div class="step-list__header">' + flow.name + ' (' + flow.steps.length + '단계)</div>';

  flow.steps.forEach(function(step, idx) {
    var isActive = idx === currentStepIdx;
    var isVisited = visitedSteps[currentFlowIdx + '-' + idx];
    var cls = 'step-item';
    if (isActive) cls += ' active';
    else if (isVisited) cls += ' visited';

    html += '<div class="' + cls + '" onclick="goToStep(' + idx + ')">';
    html += '<div class="step-item__num">' + (isVisited && !isActive ? '&#10003;' : (idx + 1)) + '</div>';
    html += '<div class="step-item__text">';
    html += '<div class="step-item__name">' + step.screen + '. ' + step.name + '</div>';
    html += '<div class="step-item__action">' + step.action + '</div>';
    html += '</div></div>';

    if (idx < flow.steps.length - 1) {
      html += '<div class="step-arrow">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>' +
        '<span>' + step.action + '</span></div>';
    }
  });

  document.getElementById('stepList').innerHTML = html;
}

function renderScreen() {
  var flow = FLOWS[currentFlowIdx];
  var step = flow.steps[currentStepIdx];
  var img = document.getElementById('screenImg');
  img.src = 'screenshots/' + step.file + '.png';
  img.alt = step.screen + '. ' + step.name;
}

function renderDescription() {
  var flow = FLOWS[currentFlowIdx];
  var step = flow.steps[currentStepIdx];

  var html = '<div>' +
    '<div class="desc-panel__screen-num">SCREEN ' + step.screen + '</div>' +
    '<div class="desc-panel__screen-name">' + step.name + '</div>' +
    '</div>';

  html += '<div class="desc-panel__divider"></div>';

  // User Action
  html += '<div>' +
    '<div class="desc-panel__section-title">사용자 액션</div>' +
    '<div class="desc-panel__action-badge">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>' +
    step.action + '</div></div>';

  // Narration
  html += '<div>' +
    '<div class="desc-panel__section-title">나레이션</div>' +
    '<div class="desc-panel__narration">' + step.narration + '</div></div>';

  html += '<div class="desc-panel__divider"></div>';

  // Next Step
  if (step.nextLabel) {
    var nextStep = flow.steps[currentStepIdx + 1];
    html += '<div>' +
      '<div class="desc-panel__next-label">다음 단계</div>' +
      '<div class="desc-panel__next-screen" onclick="goStep(1)">' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + 'var(--accent-red)' + '" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>' +
      '<span>' + step.nextLabel + ' <strong>' + nextStep.name + '</strong></span>' +
      '</div></div>';
  } else {
    // Flow complete
    if (currentFlowIdx < FLOWS.length - 1) {
      html += '<div>' +
        '<div class="desc-panel__next-label">플로우 완료</div>' +
        '<div class="desc-panel__next-screen" onclick="switchFlow(' + (currentFlowIdx + 1) + ')">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-green)" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>' +
        '<span>다음 플로우: <strong>' + FLOWS[currentFlowIdx + 1].name + '</strong></span>' +
        '</div></div>';
    } else {
      html += '<div>' +
        '<div class="desc-panel__next-label">모든 플로우 완료</div>' +
        '<div class="desc-panel__action-badge" style="background:#1A2A1A;color:var(--accent-green);border-color:#2A3A2A;">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>' +
        '전체 플로우 스크립트 완료</div></div>';
    }
  }

  document.getElementById('descPanel').innerHTML = html;
}

function updateNavButtons() {
  var flow = FLOWS[currentFlowIdx];
  document.getElementById('btnPrev').disabled = (currentStepIdx === 0 && currentFlowIdx === 0);
  document.getElementById('btnNext').disabled = (currentStepIdx === flow.steps.length - 1 && currentFlowIdx === FLOWS.length - 1);
}

function updateCounter() {
  var flow = FLOWS[currentFlowIdx];
  document.getElementById('stepCounter').textContent =
    (currentStepIdx + 1) + ' / ' + flow.steps.length;
}

function updateProgress() {
  var flow = FLOWS[currentFlowIdx];
  var pct = ((currentStepIdx + 1) / flow.steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function render() {
  visitedSteps[currentFlowIdx + '-' + currentStepIdx] = true;
  renderFlowTabs();
  renderStepList();
  renderScreen();
  renderDescription();
  updateNavButtons();
  updateCounter();
  updateProgress();
}

// ─── Navigation ───
function switchFlow(idx) {
  currentFlowIdx = idx;
  currentStepIdx = 0;
  render();
}

function goToStep(idx) {
  currentStepIdx = idx;
  render();
}

function goStep(delta) {
  var flow = FLOWS[currentFlowIdx];
  var newIdx = currentStepIdx + delta;
  if (newIdx >= 0 && newIdx < flow.steps.length) {
    currentStepIdx = newIdx;
    render();
  } else if (delta > 0 && currentFlowIdx < FLOWS.length - 1) {
    switchFlow(currentFlowIdx + 1);
  } else if (delta < 0 && currentFlowIdx > 0) {
    currentFlowIdx--;
    currentStepIdx = FLOWS[currentFlowIdx].steps.length - 1;
    render();
  }
}

// ─── Keyboard ───
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goStep(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goStep(-1); }
  else if (e.key >= '1' && e.key <= '5') { switchFlow(parseInt(e.key) - 1); }
});

// ─── Init ───
render();
</script>
