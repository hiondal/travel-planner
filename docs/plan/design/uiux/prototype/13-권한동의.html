<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>위치정보 수집 동의 - travel-planner</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* -----------------------------------------------
       화면 13: 권한 동의
       UFR-SCHD-010 시나리오2, NFR-SEC-020
       ----------------------------------------------- */

    .consent-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: var(--space-base);
    }

    /* 상단 아이콘 영역 */
    .consent-icon {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: var(--space-3xl) 0 var(--space-xl);
      color: var(--accent-blue);
    }

    /* 타이틀 */
    .consent-title {
      font-size: var(--font-h1);
      font-weight: var(--font-weight-bold);
      text-align: center;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
    }

    /* 설명 문구 */
    .consent-desc {
      font-size: var(--font-body1);
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.6;
      margin-bottom: var(--space-2xl);
    }

    /* 수집 항목 정보 카드 */
    .consent-details {
      margin-bottom: var(--space-xl);
    }

    .consent-details__section {
      margin-bottom: var(--space-base);
    }

    .consent-details__section:last-child {
      margin-bottom: 0;
    }

    .consent-details__label {
      font-size: var(--font-caption);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: var(--space-xs);
    }

    .consent-details__item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      font-size: var(--font-body2);
      color: var(--text-primary);
      line-height: 1.5;
      margin-bottom: var(--space-xs);
    }

    .consent-details__item:last-child {
      margin-bottom: 0;
    }

    .consent-details__bullet {
      display: inline-block;
      width: 4px;
      height: 4px;
      background-color: var(--text-secondary);
      border-radius: 50%;
      margin-top: 8px;
      flex-shrink: 0;
    }

    /* 위치정보 없이 이용 가능 안내 */
    .consent-fallback {
      margin-bottom: var(--space-2xl);
    }

    .consent-fallback__title {
      font-size: var(--font-body2);
      font-weight: var(--font-weight-semibold);
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }

    .consent-fallback__list {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .consent-fallback__item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      font-size: var(--font-body2);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .consent-fallback__bullet {
      display: inline-block;
      width: 4px;
      height: 4px;
      background-color: var(--text-disabled);
      border-radius: 50%;
      margin-top: 8px;
      flex-shrink: 0;
    }

    /* 하단 CTA 영역 */
    .consent-actions {
      margin-top: auto;
      padding-bottom: var(--space-3xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
    }
  </style>
</head>
<body>
  <main class="consent-page" role="main" aria-labelledby="consent-heading">

    <!-- 위치 아이콘 -->
    <div class="consent-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round"
           role="presentation">
        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>

    <!-- 타이틀 & 설명 -->
    <h1 id="consent-heading" class="consent-title">위치정보 수집 동의</h1>
    <p class="consent-desc">
      여행지 상태 모니터링과 대안 추천을 위해<br>
      위치정보가 필요합니다.
    </p>

    <!-- 수집 항목 / 이용 목적 / 보유 기간 카드 -->
    <section class="card consent-details" aria-label="위치정보 수집 상세 내역">
      <!-- 수집 항목 -->
      <div class="consent-details__section">
        <p class="consent-details__label">수집 항목</p>
        <ul aria-label="수집 항목 목록">
          <li class="consent-details__item">
            <span class="consent-details__bullet" aria-hidden="true"></span>
            <span>현재 위치 (GPS)</span>
          </li>
        </ul>
      </div>

      <!-- 이용 목적 -->
      <div class="consent-details__section">
        <p class="consent-details__label">이용 목적</p>
        <ul aria-label="이용 목적 목록">
          <li class="consent-details__item">
            <span class="consent-details__bullet" aria-hidden="true"></span>
            <span>실시간 이동시간 계산</span>
          </li>
          <li class="consent-details__item">
            <span class="consent-details__bullet" aria-hidden="true"></span>
            <span>대안 장소 거리 계산</span>
          </li>
        </ul>
      </div>

      <!-- 보유 기간 -->
      <div class="consent-details__section">
        <p class="consent-details__label">보유 기간</p>
        <ul aria-label="보유 기간 안내">
          <li class="consent-details__item">
            <span class="consent-details__bullet" aria-hidden="true"></span>
            <span>여행 종료 후 30일, 이후 자동 삭제</span>
          </li>
        </ul>
      </div>
    </section>

    <!-- 위치정보 없이 이용 가능한 기능 안내 -->
    <section class="consent-fallback" aria-label="위치정보 없이 이용 가능한 기능">
      <p class="consent-fallback__title">위치정보 없이 이용 가능한 기능:</p>
      <ul class="consent-fallback__list">
        <li class="consent-fallback__item">
          <span class="consent-fallback__bullet" aria-hidden="true"></span>
          <span>수동 위치 입력으로 일정 등록</span>
        </li>
        <li class="consent-fallback__item">
          <span class="consent-fallback__bullet" aria-hidden="true"></span>
          <span>상태 배지 조회 (이동시간 제외)</span>
        </li>
        <li class="consent-fallback__item">
          <span class="consent-fallback__bullet" aria-hidden="true"></span>
          <span>출발 전 브리핑 수신</span>
        </li>
      </ul>
    </section>

    <!-- 하단 CTA -->
    <div class="consent-actions">
      <button
        class="btn btn--primary w-full"
        onclick="handleConsent(true)"
        aria-label="위치정보 수집에 동의하고 계속하기"
      >
        동의하고 계속
      </button>
      <button
        class="btn btn--text w-full"
        onclick="handleConsent(false)"
        aria-label="위치정보 없이 계속하기"
      >
        위치정보 없이 계속하기
      </button>
    </div>

  </main>

  <script src="common.js"></script>
  <script>
    /**
     * 위치정보 동의 처리
     * @param {boolean} agreed - true: 동의, false: 거부
     */
    function handleConsent(agreed) {
      var consentData = {
        locationConsent: agreed,
        consentedAt: new Date().toISOString(),
      };
      sessionStorage.setItem('locationConsent', JSON.stringify(consentData));

      if (agreed) {
        showToast('위치정보 수집에 동의했습니다');
        setTimeout(function () {
          navigateTo('01-일정표.html');
        }, 800);
      } else {
        navigateTo('01-일정표.html');
      }
    }
  </script>
</body>
</html>
