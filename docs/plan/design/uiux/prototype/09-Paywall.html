<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paywall - travel-planner</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .paywall-preview {
      margin: 0 var(--space-base) var(--space-xl);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      height: 160px;
      background-color: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .paywall-preview__blur {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #1A1A1A 0%, #2A2A2A 50%, #1A1A1A 100%);
      filter: blur(4px);
      opacity: 0.8;
    }

    .paywall-preview__cards {
      position: relative;
      z-index: 1;
      display: flex;
      gap: var(--space-sm);
      padding: var(--space-base);
    }

    .paywall-preview__card {
      width: 80px;
      height: 100px;
      background-color: var(--bg-input);
      border-radius: var(--radius-sm);
      opacity: 0.6;
    }

    .paywall-preview__lock {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 48px;
      height: 48px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    .paywall-text {
      text-align: center;
      padding: 0 var(--space-base);
      margin-bottom: var(--space-2xl);
    }

    .paywall-text__title {
      font-size: var(--font-h1);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-sm);
    }

    .paywall-text__desc {
      font-size: var(--font-body1);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .plan-cards {
      padding: 0 var(--space-base);
    }

    .plan-card {
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-base);
    }

    .plan-card--premium {
      background: var(--gradient-premium);
    }

    .plan-card--secondary {
      background-color: var(--bg-card);
      border: 1px solid var(--accent-purple);
    }

    .plan-card__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: var(--space-base);
    }

    .plan-card__name {
      font-size: var(--font-h2);
      font-weight: var(--font-weight-bold);
    }

    .plan-card__price {
      font-size: var(--font-body1);
      font-weight: var(--font-weight-semibold);
    }

    .plan-card__divider {
      height: 1px;
      background-color: rgba(255, 255, 255, 0.2);
      margin-bottom: var(--space-base);
    }

    .plan-card__features {
      margin-bottom: var(--space-lg);
    }

    .plan-card__feature {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--font-body2);
      margin-bottom: var(--space-sm);
      line-height: 1.5;
    }

    .plan-card__feature::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      background-color: currentColor;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .plan-card--premium .btn--primary {
      background-color: #FFFFFF;
      color: var(--accent-purple);
    }

    .plan-card--secondary .btn--secondary {
      border: 1px solid var(--accent-purple);
      color: var(--accent-purple);
    }

    .paywall-free {
      text-align: center;
      padding: var(--space-base);
      font-size: var(--font-body2);
      color: var(--text-disabled);
    }
  </style>
</head>
<body>
  <div class="page-container">
    <app-top-nav back close></app-top-nav>

    <main class="page-content page-content--no-tab" role="main">
      <div class="paywall-preview" aria-hidden="true">
        <div class="paywall-preview__blur"></div>
        <div class="paywall-preview__cards">
          <div class="paywall-preview__card"></div>
          <div class="paywall-preview__card"></div>
          <div class="paywall-preview__card"></div>
        </div>
        <div class="paywall-preview__lock">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
      </div>

      <div class="paywall-text">
        <h1 class="paywall-text__title">대안 추천은 유료 기능입니다</h1>
        <p class="paywall-text__desc">돌발 상황에서 최적의 대안을<br>탭 한 번으로 일정에 반영하세요</p>
      </div>

      <div class="plan-cards">
        <!-- Trip Pass -->
        <div class="plan-card plan-card--premium" role="region" aria-label="Trip Pass 플랜">
          <div class="plan-card__header">
            <span class="plan-card__name">Trip Pass</span>
            <span class="plan-card__price">7,900원/건</span>
          </div>
          <div class="plan-card__divider"></div>
          <div class="plan-card__features">
            <div class="plan-card__feature">무제한 브리핑</div>
            <div class="plan-card__feature">대안 카드 (여행 1건)</div>
            <div class="plan-card__feature">출발 전 브리핑 무제한</div>
          </div>
          <button class="btn btn--primary" onclick="handlePurchase('trip-pass')">Trip Pass 시작</button>
        </div>

        <!-- Pro -->
        <div class="plan-card plan-card--secondary" role="region" aria-label="Pro 플랜">
          <div class="plan-card__header">
            <span class="plan-card__name">Pro</span>
            <span class="plan-card__price">4,900원/월</span>
          </div>
          <div class="plan-card__divider" style="background-color: rgba(255,255,255,0.1)"></div>
          <div class="plan-card__features">
            <div class="plan-card__feature">Trip Pass 모든 혜택</div>
            <div class="plan-card__feature">월 구독 (모든 여행 적용)</div>
            <div class="plan-card__feature">우선 지원</div>
          </div>
          <button class="btn btn--secondary" onclick="handlePurchase('pro')" style="border: 1px solid var(--accent-purple); color: var(--accent-purple);">Pro 시작</button>
        </div>
      </div>

      <p class="paywall-free">Free 플랜: 1일 1회 브리핑</p>
    </main>
  </div>

  <script src="common.js"></script>
  <script>
    'use strict';

    function handlePurchase(plan) {
      var planName = plan === 'trip-pass' ? 'Trip Pass' : 'Pro';
      showToast(planName + ' 결제 화면으로 이동합니다 (프로토타입)');
      setTimeout(function() {
        showToast(planName + '가 활성화되었습니다!');
        setTimeout(function() {
          goBack();
        }, 1000);
      }, 1500);
    }
  </script>
</body>
</html>
