openapi: 3.0.0
info:
  title: Schedule Service API
  description: 여행 일정 CRUD, 장소 추가/교체/삭제, 일정표 조회 서비스 API
  version: 1.0.0
  contact:
    name: travel-planner Team

servers:
  - url: https://virtserver.swaggerhub.com/travel-planner/schedule-service/1.0.0
    description: SwaggerHub Mock Server
  - url: https://api.travel-planner.com/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/v1
    description: Development Server

tags:
  - name: Trips
    description: 여행 일정 관리
  - name: ScheduleItems
    description: 일정 장소 관리

paths:
  /trips:
    post:
      tags:
        - Trips
      summary: 여행 일정 생성
      description: 여행명, 기간, 도시를 입력하여 새 여행 일정을 생성한다. 최초 여행 생성 시 위치정보 동의 이력이 없으면 428 응답으로 동의 요청 필요 신호를 반환한다.
      operationId: createTrip
      x-user-story: UFR-SCHD-010
      x-controller: SchdController
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
            example:
              name: "도쿄 3박4일"
              start_date: "2026-03-15"
              end_date: "2026-03-18"
              city: "도쿄"
      responses:
        '201':
          description: 여행 일정 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
              example:
                trip_id: "trip_01HX..."
                name: "도쿄 3박4일"
                start_date: "2026-03-15"
                end_date: "2026-03-18"
                city: "도쿄"
                status: "ACTIVE"
                schedule_items: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '428':
          description: 위치정보 동의 필요 (최초 여행 생성 시)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentRequiredResponse'
              example:
                error: "CONSENT_REQUIRED"
                message: "위치정보 수집 동의가 필요합니다."
                consent_required: true

  /trips/{trip_id}:
    get:
      tags:
        - Trips
      summary: 여행 일정 조회
      description: 특정 여행의 기본 정보를 조회한다.
      operationId: getTrip
      x-user-story: UFR-SCHD-050
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{trip_id}/schedule:
    get:
      tags:
        - Trips
      summary: 일정표 조회 (배지 포함)
      description: 여행 일정의 장소 목록을 시간순으로 조회한다. 각 장소의 상태 배지는 MNTR 서비스에서 별도 조회한다.
      operationId: getSchedule
      x-user-story: UFR-SCHD-050
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      responses:
        '200':
          description: 일정표 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
              example:
                trip_id: "trip_01HX..."
                name: "도쿄 3박4일"
                city: "도쿄"
                schedule_items:
                  - schedule_item_id: "si_01HX..."
                    place_id: "place_abc123"
                    place_name: "이치란 라멘 시부야"
                    visit_datetime: "2026-03-16T12:00:00+09:00"
                    timezone: "Asia/Tokyo"
                    order: 1
                    outside_business_hours: false
                  - schedule_item_id: "si_02HX..."
                    place_id: "place_def456"
                    place_name: "시부야 스크램블 교차로"
                    visit_datetime: "2026-03-16T15:00:00+09:00"
                    timezone: "Asia/Tokyo"
                    order: 2
                    outside_business_hours: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{trip_id}/schedule-items:
    post:
      tags:
        - ScheduleItems
      summary: 일정에 장소 추가
      description: 선택한 장소와 방문 일시를 일정표에 추가한다. 영업시간 외 방문 시간인 경우 경고와 함께 200 응답을 반환하며, force=true로 재요청 시 강제 추가된다. 추가 완료 시 MNTR 서비스에 모니터링 등록 이벤트가 비동기 발행된다.
      operationId: addScheduleItem
      x-user-story: UFR-SCHD-030
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddScheduleItemRequest'
            examples:
              normal:
                summary: 영업시간 내 추가
                value:
                  place_id: "place_abc123"
                  visit_datetime: "2026-03-16T12:00:00+09:00"
                  timezone: "Asia/Tokyo"
              force:
                summary: 영업시간 외 강제 추가
                value:
                  place_id: "place_abc123"
                  visit_datetime: "2026-03-16T09:00:00+09:00"
                  timezone: "Asia/Tokyo"
                  force: true
      responses:
        '201':
          description: 장소 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleItemResponse'
              example:
                schedule_item_id: "si_01HX..."
                place_id: "place_abc123"
                place_name: "이치란 라멘 시부야"
                visit_datetime: "2026-03-16T12:00:00+09:00"
                timezone: "Asia/Tokyo"
                order: 1
                outside_business_hours: false
        '200':
          description: 영업시간 외 경고 (force=false 시)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessHoursWarningResponse'
              example:
                warning: "OUTSIDE_BUSINESS_HOURS"
                message: "영업시간 외입니다 (영업시간: 11:00~22:00)"
                business_hours: "11:00~22:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{trip_id}/schedule-items/{item_id}:
    delete:
      tags:
        - ScheduleItems
      summary: 일정 장소 삭제
      description: 일정표에서 특정 장소를 삭제한다. 삭제 후 MNTR 서비스 모니터링이 해제되고 후속 일정의 이동시간이 재계산된다.
      operationId: deleteScheduleItem
      x-user-story: UFR-SCHD-060
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{trip_id}/schedule-items/{item_id}/replace:
    put:
      tags:
        - ScheduleItems
      summary: 일정 장소 교체 (대안 선택 후)
      description: 기존 장소를 대안 장소로 교체한다. 원래 장소의 모니터링이 해제되고 대안 장소의 모니터링이 등록된다. 후속 2구간 이동시간이 자동 재계산된다.
      operationId: replaceScheduleItem
      x-user-story: UFR-SCHD-040
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
        - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceScheduleItemRequest'
            example:
              new_place_id: "place_xyz789"
      responses:
        '200':
          description: 교체 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplaceScheduleItemResponse'
              example:
                schedule_item_id: "si_01HX..."
                original_place:
                  place_id: "place_abc123"
                  place_name: "이치란 라멘 시부야"
                new_place:
                  place_id: "place_xyz789"
                  place_name: "후쿠로쿠 라멘"
                travel_time_diff_minutes: -5
                updated_schedule_items:
                  - schedule_item_id: "si_01HX..."
                    place_id: "place_xyz789"
                    place_name: "후쿠로쿠 라멘"
                    visit_datetime: "2026-03-16T12:00:00+09:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    CreateTripRequest:
      type: object
      required:
        - name
        - start_date
        - end_date
        - city
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 여행명 (1~50자)
          example: "도쿄 3박4일"
        start_date:
          type: string
          format: date
          description: 여행 시작일
          example: "2026-03-15"
        end_date:
          type: string
          format: date
          description: 여행 종료일 (시작일 이후)
          example: "2026-03-18"
        city:
          type: string
          description: 방문 도시 (지원 도시 목록에서 선택)
          example: "도쿄"

    TripResponse:
      type: object
      properties:
        trip_id:
          type: string
          example: "trip_01HX..."
        name:
          type: string
          example: "도쿄 3박4일"
        start_date:
          type: string
          format: date
          example: "2026-03-15"
        end_date:
          type: string
          format: date
          example: "2026-03-18"
        city:
          type: string
          example: "도쿄"
        status:
          type: string
          enum: [ACTIVE, COMPLETED, CANCELLED]
          example: "ACTIVE"
        schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    ScheduleResponse:
      type: object
      properties:
        trip_id:
          type: string
          example: "trip_01HX..."
        name:
          type: string
          example: "도쿄 3박4일"
        city:
          type: string
          example: "도쿄"
        schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    ScheduleItemSummary:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        visit_datetime:
          type: string
          format: date-time
          description: 방문 일시 (IANA timezone 기준)
          example: "2026-03-16T12:00:00+09:00"
        timezone:
          type: string
          description: IANA 타임존
          example: "Asia/Tokyo"
        order:
          type: integer
          description: 방문 순서
          example: 1
        outside_business_hours:
          type: boolean
          description: 영업시간 외 등록 여부
          example: false

    AddScheduleItemRequest:
      type: object
      required:
        - place_id
        - visit_datetime
        - timezone
      properties:
        place_id:
          type: string
          example: "place_abc123"
        visit_datetime:
          type: string
          format: date-time
          description: 방문 일시 (ISO 8601, 현지 시간 기준)
          example: "2026-03-16T12:00:00+09:00"
        timezone:
          type: string
          description: IANA 타임존
          example: "Asia/Tokyo"
        force:
          type: boolean
          description: 영업시간 외 강제 추가 여부
          default: false
          example: false

    ScheduleItemResponse:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        visit_datetime:
          type: string
          format: date-time
          example: "2026-03-16T12:00:00+09:00"
        timezone:
          type: string
          example: "Asia/Tokyo"
        order:
          type: integer
          example: 1
        outside_business_hours:
          type: boolean
          example: false

    BusinessHoursWarningResponse:
      type: object
      properties:
        warning:
          type: string
          example: "OUTSIDE_BUSINESS_HOURS"
        message:
          type: string
          example: "영업시간 외입니다 (영업시간: 11:00~22:00)"
        business_hours:
          type: string
          example: "11:00~22:00"

    ReplaceScheduleItemRequest:
      type: object
      required:
        - new_place_id
      properties:
        new_place_id:
          type: string
          description: 교체할 대안 장소 ID
          example: "place_xyz789"

    ReplaceScheduleItemResponse:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        original_place:
          type: object
          properties:
            place_id:
              type: string
              example: "place_abc123"
            place_name:
              type: string
              example: "이치란 라멘 시부야"
        new_place:
          type: object
          properties:
            place_id:
              type: string
              example: "place_xyz789"
            place_name:
              type: string
              example: "후쿠로쿠 라멘"
        travel_time_diff_minutes:
          type: integer
          description: 이동시간 변화 (분, 음수=단축)
          example: -5
        updated_schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    ConsentRequiredResponse:
      type: object
      properties:
        error:
          type: string
          example: "CONSENT_REQUIRED"
        message:
          type: string
          example: "위치정보 수집 동의가 필요합니다."
        consent_required:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "요청한 리소스를 찾을 수 없습니다."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00Z"

  parameters:
    TripIdPath:
      name: trip_id
      in: path
      required: true
      description: 여행 일정 ID
      schema:
        type: string
        example: "trip_01HX..."

    ItemIdPath:
      name: item_id
      in: path
      required: true
      description: 일정 장소 항목 ID
      schema:
        type: string
        example: "si_01HX..."

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "BAD_REQUEST"
            message: "여행명은 1~50자 사이여야 합니다."
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "UNAUTHORIZED"
            message: "유효하지 않은 토큰입니다."
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "NOT_FOUND"
            message: "요청한 리소스를 찾을 수 없습니다."

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
