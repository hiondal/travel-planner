openapi: 3.0.0
info:
  title: Schedule Service API
  description: 여행 일정 CRUD, 장소 추가/교체/삭제, 일정표 조회 서비스 API
  version: 1.1.0
  contact:
    name: travel-planner Team

servers:
  - url: http://localhost:8082/api/v1
    description: Local Development
  - url: https://api.travel-planner.com/api/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/api/v1
    description: Development Server

tags:
  - name: Trips
    description: 여행 일정 관리
  - name: ScheduleItems
    description: 일정 장소 관리

paths:
  /trips:
    get:
      tags:
        - Trips
      summary: 여행 목록 조회
      description: |
        사용자의 여행 목록을 조회한다.
        응답은 ApiResponse<TripListResponse> 래핑 구조로 반환된다.
        TripListResponse는 trips 배열과 total 카운트를 포함한다.
      operationId: getTrips
      x-user-story: UFR-SCHD-050
      x-controller: SchdController
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 여행 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTripList'
              example:
                success: true
                data:
                  trips:
                    - trip_id: "trip_01HX..."
                      name: "도쿄 3박4일"
                      start_date: "2026-03-15"
                      end_date: "2026-03-18"
                      city: "도쿄"
                      status: "ACTIVE"
                      schedule_items: []
                  total: 1
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Trips
      summary: 여행 일정 생성
      description: |
        여행명, 기간, 도시를 입력하여 새 여행 일정을 생성한다.
        응답은 ApiResponse<TripResponse> 래핑 구조로 반환된다 (201 Created).
      operationId: createTrip
      x-user-story: UFR-SCHD-010
      x-controller: SchdController
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
            example:
              name: "도쿄 3박4일"
              start_date: "2026-03-15"
              end_date: "2026-03-18"
              city: "도쿄"
      responses:
        '201':
          description: 여행 일정 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTrip'
              example:
                success: true
                data:
                  trip_id: "trip_01HX..."
                  name: "도쿄 3박4일"
                  start_date: "2026-03-15"
                  end_date: "2026-03-18"
                  city: "도쿄"
                  status: "ACTIVE"
                  schedule_items: []
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trips/{tripId}:
    get:
      tags:
        - Trips
      summary: 여행 일정 조회
      description: |
        특정 여행의 기본 정보를 조회한다.
        응답은 ApiResponse<TripResponse> 래핑 구조로 반환된다.
      operationId: getTrip
      x-user-story: UFR-SCHD-050
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTrip'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Trips
      summary: 여행 삭제
      description: |
        여행과 관련된 모든 일정 아이템을 함께 삭제한다.
        응답 본문 없이 204 No Content를 반환한다.
      operationId: deleteTrip
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      responses:
        '204':
          description: 삭제 성공 (응답 본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/schedule:
    get:
      tags:
        - Trips
      summary: 일정표 조회
      description: |
        여행 일정의 장소 목록을 시간순으로 조회한다.
        `date` 쿼리 파라미터로 특정 날짜 필터링이 가능하다 (형식: YYYY-MM-DD).
        응답은 ApiResponse<ScheduleResponse> 래핑 구조로 반환된다.
      operationId: getSchedule
      x-user-story: UFR-SCHD-050
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
        - name: date
          in: query
          required: false
          description: "날짜 필터 (YYYY-MM-DD 형식, 생략 시 전체 조회)"
          schema:
            type: string
            format: date
            example: "2026-03-16"
      responses:
        '200':
          description: 일정표 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSchedule'
              example:
                success: true
                data:
                  trip_id: "trip_01HX..."
                  name: "도쿄 3박4일"
                  city: "도쿄"
                  schedule_items:
                    - schedule_item_id: "si_01HX..."
                      place_id: "place_abc123"
                      place_name: "이치란 라멘 시부야"
                      visit_datetime: "2026-03-16T12:00:00"
                      timezone: "Asia/Tokyo"
                      order: 1
                      outside_business_hours: false
                    - schedule_item_id: "si_02HX..."
                      place_id: "place_def456"
                      place_name: "시부야 스크램블 교차로"
                      visit_datetime: "2026-03-16T15:00:00"
                      timezone: "Asia/Tokyo"
                      order: 2
                      outside_business_hours: false
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/schedule-items:
    post:
      tags:
        - ScheduleItems
      summary: 일정에 장소 추가
      description: |
        선택한 장소와 방문 일시를 일정표에 추가한다.
        영업시간 외 방문 시간인 경우 경고와 함께 200 응답을 반환하며,
        force=true로 재요청 시 강제 추가된다.
        성공 시 ApiResponse<ScheduleItemResponse> 래핑 구조로 201 반환.
        영업시간 경고 시 ApiResponse 래핑 없이 BusinessHoursWarningResponse로 200 반환.
      operationId: addScheduleItem
      x-user-story: UFR-SCHD-030
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddScheduleItemRequest'
            examples:
              normal:
                summary: 영업시간 내 추가
                value:
                  place_id: "place_abc123"
                  visit_datetime: "2026-03-16T12:00:00+09:00"
                  timezone: "Asia/Tokyo"
              force:
                summary: 영업시간 외 강제 추가
                value:
                  place_id: "place_abc123"
                  visit_datetime: "2026-03-16T09:00:00+09:00"
                  timezone: "Asia/Tokyo"
                  force: true
      responses:
        '201':
          description: 장소 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseScheduleItem'
              example:
                success: true
                data:
                  schedule_item_id: "si_01HX..."
                  place_id: "place_abc123"
                  place_name: "이치란 라멘 시부야"
                  visit_datetime: "2026-03-16T12:00:00"
                  timezone: "Asia/Tokyo"
                  order: 1
                  outside_business_hours: false
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"
        '200':
          description: 영업시간 외 경고 (force=false 시, ApiResponse 래핑 없음)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessHoursWarningResponse'
              example:
                warning: "OUTSIDE_BUSINESS_HOURS"
                message: "영업시간 외입니다 (영업시간: 11:00~22:00)"
                business_hours: "11:00~22:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/schedule-items/{itemId}:
    delete:
      tags:
        - ScheduleItems
      summary: 일정 장소 삭제
      description: |
        일정표에서 특정 장소를 삭제한다.
        응답 본문 없이 204 No Content를 반환한다.
      operationId: deleteScheduleItem
      x-user-story: UFR-SCHD-060
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '204':
          description: 삭제 성공 (응답 본문 없음)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trips/{tripId}/schedule-items/{itemId}/replace:
    put:
      tags:
        - ScheduleItems
      summary: 일정 장소 교체 (대안 선택 후)
      description: |
        기존 장소를 대안 장소로 교체한다.
        응답은 ApiResponse<ReplaceScheduleItemResponse> 래핑 구조로 반환된다.
      operationId: replaceScheduleItem
      x-user-story: UFR-SCHD-040
      x-controller: SchdController
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TripIdPath'
        - $ref: '#/components/parameters/ItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceScheduleItemRequest'
            example:
              new_place_id: "place_xyz789"
      responses:
        '200':
          description: 교체 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReplaceScheduleItem'
              example:
                success: true
                data:
                  schedule_item_id: "si_01HX..."
                  original_place:
                    place_id: "place_abc123"
                    place_name: "이치란 라멘 시부야"
                  new_place:
                    place_id: "place_xyz789"
                    place_name: "후쿠로쿠 라멘"
                  travel_time_diff_minutes: -5
                  updated_schedule_items:
                    - schedule_item_id: "si_01HX..."
                      place_id: "place_xyz789"
                      place_name: "후쿠로쿠 라멘"
                      visit_datetime: "2026-03-16T12:00:00"
                      timezone: "Asia/Tokyo"
                      order: 1
                      outside_business_hours: false
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    ApiResponseTripList:
      type: object
      description: ApiResponse<TripListResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/TripListResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    ApiResponseTrip:
      type: object
      description: ApiResponse<TripResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/TripResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    ApiResponseSchedule:
      type: object
      description: ApiResponse<ScheduleResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ScheduleResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    ApiResponseScheduleItem:
      type: object
      description: ApiResponse<ScheduleItemResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ScheduleItemResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    ApiResponseReplaceScheduleItem:
      type: object
      description: ApiResponse<ReplaceScheduleItemResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ReplaceScheduleItemResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    CreateTripRequest:
      type: object
      required:
        - name
        - start_date
        - end_date
        - city
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 여행명 (1~50자)
          example: "도쿄 3박4일"
        start_date:
          type: string
          format: date
          description: 여행 시작일
          example: "2026-03-15"
        end_date:
          type: string
          format: date
          description: 여행 종료일 (시작일 이후)
          example: "2026-03-18"
        city:
          type: string
          description: 방문 도시 (지원 도시 목록에서 선택)
          example: "도쿄"

    TripListResponse:
      type: object
      properties:
        trips:
          type: array
          items:
            $ref: '#/components/schemas/TripResponse'
        total:
          type: integer
          description: 전체 여행 수
          example: 1

    TripResponse:
      type: object
      properties:
        trip_id:
          type: string
          example: "trip_01HX..."
        name:
          type: string
          example: "도쿄 3박4일"
        start_date:
          type: string
          format: date
          example: "2026-03-15"
        end_date:
          type: string
          format: date
          example: "2026-03-18"
        city:
          type: string
          example: "도쿄"
        status:
          type: string
          enum: [ACTIVE, COMPLETED, CANCELLED]
          example: "ACTIVE"
        schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    ScheduleResponse:
      type: object
      properties:
        trip_id:
          type: string
          example: "trip_01HX..."
        name:
          type: string
          example: "도쿄 3박4일"
        city:
          type: string
          example: "도쿄"
        schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    ScheduleItemSummary:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        visit_datetime:
          type: string
          format: date-time
          description: 방문 일시 (LocalDateTime으로 직렬화, timezone 없음)
          example: "2026-03-16T12:00:00"
        timezone:
          type: string
          description: IANA 타임존
          example: "Asia/Tokyo"
        order:
          type: integer
          description: 방문 순서
          example: 1
        outside_business_hours:
          type: boolean
          description: 영업시간 외 등록 여부
          example: false

    AddScheduleItemRequest:
      type: object
      required:
        - place_id
        - visit_datetime
        - timezone
      properties:
        place_id:
          type: string
          example: "place_abc123"
        visit_datetime:
          type: string
          format: date-time
          description: 방문 일시 (ISO 8601, 현지 시간 기준)
          example: "2026-03-16T12:00:00+09:00"
        timezone:
          type: string
          description: IANA 타임존
          example: "Asia/Tokyo"
        force:
          type: boolean
          description: 영업시간 외 강제 추가 여부
          default: false
          example: false

    ScheduleItemResponse:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        visit_datetime:
          type: string
          format: date-time
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T12:00:00"
        timezone:
          type: string
          example: "Asia/Tokyo"
        order:
          type: integer
          example: 1
        outside_business_hours:
          type: boolean
          example: false

    BusinessHoursWarningResponse:
      type: object
      description: ApiResponse 래핑 없이 직접 반환
      properties:
        warning:
          type: string
          example: "OUTSIDE_BUSINESS_HOURS"
        message:
          type: string
          example: "영업시간 외입니다 (영업시간: 11:00~22:00)"
        business_hours:
          type: string
          example: "11:00~22:00"

    ReplaceScheduleItemRequest:
      type: object
      required:
        - new_place_id
      properties:
        new_place_id:
          type: string
          description: 교체할 대안 장소 ID
          example: "place_xyz789"

    ReplaceScheduleItemResponse:
      type: object
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        original_place:
          $ref: '#/components/schemas/PlaceRef'
        new_place:
          $ref: '#/components/schemas/PlaceRef'
        travel_time_diff_minutes:
          type: integer
          description: 이동시간 변화 (분, 음수=단축)
          example: -5
        updated_schedule_items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleItemSummary'

    PlaceRef:
      type: object
      properties:
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errorCode:
          type: string
          example: "NOT_FOUND"
        errorMessage:
          type: string
          example: "요청한 리소스를 찾을 수 없습니다."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

  parameters:
    TripIdPath:
      name: tripId
      in: path
      required: true
      description: 여행 일정 ID
      schema:
        type: string
        example: "trip_01HX..."

    ItemIdPath:
      name: itemId
      in: path
      required: true
      description: 일정 장소 항목 ID
      schema:
        type: string
        example: "si_01HX..."

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "BAD_REQUEST"
            errorMessage: "여행명은 1~50자 사이여야 합니다."
            timestamp: "2026-03-15T09:00:00"
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "UNAUTHORIZED"
            errorMessage: "유효하지 않은 토큰입니다."
            timestamp: "2026-03-15T09:00:00"
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "NOT_FOUND"
            errorMessage: "요청한 리소스를 찾을 수 없습니다."
