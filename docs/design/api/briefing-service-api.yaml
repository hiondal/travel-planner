openapi: 3.0.0
info:
  title: Briefing Service API
  description: 출발 전 브리핑 생성, 조회, 목록, Push 발송 서비스 API
  version: 1.1.0
  contact:
    name: travel-planner Team

servers:
  - url: http://localhost:8085/api/v1
    description: Local Development
  - url: https://api.travel-planner.com/api/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/api/v1
    description: Development Server

tags:
  - name: Briefings
    description: 브리핑 조회 및 목록
  - name: BriefingGeneration
    description: 브리핑 생성 (내부/스케줄러 호출용)

paths:
  /briefings/{briefingId}:
    get:
      tags:
        - Briefings
      summary: 브리핑 상세 조회
      description: |
        특정 브리핑의 상세 내용을 조회한다. 브리핑 소유권을 JWT user_id로 검증한다.
        만료된 브리핑(생성 시각이 방문 예정 시간 이후)은 `expired: true`로 표시하고
        `expire_message: "이미 지난 브리핑입니다"` 를 포함한다.
        응답은 ApiResponse<BriefingDetailResponse> 래핑 구조로 반환된다.
      operationId: getBriefing
      x-user-story: UFR-BRIF-050
      x-controller: BriefController
      security:
        - BearerAuth: []
      parameters:
        - name: briefingId
          in: path
          required: true
          description: 브리핑 ID
          schema:
            type: string
            example: "brif_01HX..."
      responses:
        '200':
          description: 브리핑 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBriefingDetail'
              examples:
                safe_briefing:
                  summary: 안심 브리핑
                  value:
                    success: true
                    data:
                      briefing_id: "brif_01HX..."
                      type: "SAFE"
                      place_id: "place_abc123"
                      place_name: "이치란 라멘 시부야"
                      departure_time: "2026-03-16T12:00:00"
                      created_at: "2026-03-16T11:40:00"
                      expired: false
                      expire_message: null
                      content:
                        business_status: "영업 중"
                        congestion: "보통"
                        weather: "맑음"
                        travel_time:
                          walking_minutes: 15
                          transit_minutes: null
                          distance_m: 420
                        summary: "현재까지 모든 항목 정상입니다. 예정대로 출발하세요."
                      alternative_link: null
                    errorCode: null
                    errorMessage: null
                    timestamp: "2026-03-16T11:40:00"
                warning_briefing:
                  summary: 주의 브리핑 (만료)
                  value:
                    success: true
                    data:
                      briefing_id: "brif_02HX..."
                      type: "WARNING"
                      place_id: "place_def456"
                      place_name: "시부야 스크램블 교차로"
                      departure_time: "2026-03-16T15:00:00"
                      created_at: "2026-03-16T14:30:00"
                      expired: true
                      expire_message: "이미 지난 브리핑입니다"
                      content:
                        business_status: "영업 중"
                        congestion: "혼잡"
                        weather: "맑음"
                        travel_time:
                          walking_minutes: 20
                          transit_minutes: 8
                          distance_m: 620
                        summary: "혼잡도이(가) 감지되었습니다. 대안을 확인해보세요."
                      alternative_link: "/alternatives?place_id=place_def456"
                    errorCode: null
                    errorMessage: null
                    timestamp: "2026-03-16T14:30:00"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /briefings:
    get:
      tags:
        - Briefings
      summary: 브리핑 목록 조회
      description: |
        오늘 날짜 기준 수신한 브리핑 목록을 최신순으로 조회한다.
        `date` 파라미터로 날짜 지정 가능 (기본값: 오늘).
        응답 목록 항목에 `place_id` 필드가 포함된다.
        응답은 ApiResponse<BriefingListResponse> 래핑 구조로 반환된다.
      operationId: getBriefingList
      x-user-story: UFR-BRIF-060
      x-controller: BriefController
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: "조회 날짜 (기본값: 오늘, YYYY-MM-DD)"
          schema:
            type: string
            format: date
            example: "2026-03-16"
      responses:
        '200':
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBriefingList'
              example:
                success: true
                data:
                  date: "2026-03-16"
                  briefings:
                    - briefing_id: "brif_01HX..."
                      type: "SAFE"
                      place_id: "place_abc123"
                      place_name: "이치란 라멘 시부야"
                      created_at: "2026-03-16T11:40:00"
                      expired: false
                    - briefing_id: "brif_02HX..."
                      type: "WARNING"
                      place_id: "place_def456"
                      place_name: "시부야 스크램블 교차로"
                      created_at: "2026-03-16T14:30:00"
                      expired: false
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-16T14:30:00"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /briefings/generate:
    post:
      tags:
        - BriefingGeneration
      summary: 브리핑 생성 트리거 (내부 스케줄러 호출용)
      description: |
        스케줄러가 출발 15~30분 전에 호출하여 브리핑을 생성한다.
        멱등성 키(place_id + departure_time 해시)로 중복 생성을 방지한다.
        Free 티어 일일 1회 한도 초과 시 422 UNPROCESSABLE_ENTITY로 SKIPPED 상태 반환.
        생성 성공 시 201, 기존 브리핑 반환 시 200.
        SKIPPED 시 ApiResponse 래핑 없이 plain Map으로 반환된다.
        성공/기존 반환 시 GenerateBriefingResponse로 반환 (ApiResponse 래핑 없음).
      operationId: generateBriefing
      x-user-story: UFR-BRIF-010
      x-controller: BriefingSchedulerController
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateBriefingRequest'
            example:
              schedule_item_id: "si_01HX..."
              place_id: "place_abc123"
              user_id: "usr_01HX..."
              departure_time: "2026-03-16T12:00:00+09:00"
              triggered_at: "2026-03-16T11:40:00+09:00"
      responses:
        '201':
          description: 브리핑 생성 성공 (ApiResponse 래핑 없음)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateBriefingResponse'
              example:
                briefing_id: "brif_01HX..."
                status: "CREATED"
                type: "SAFE"
        '200':
          description: 기존 브리핑 반환 (멱등성 - 중복 요청, ApiResponse 래핑 없음)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateBriefingResponse'
              example:
                briefing_id: "brif_01HX..."
                status: "EXISTING"
                type: "SAFE"
        '422':
          description: 생성 스킵 (Free 티어 한도 초과, plain Map 반환)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingSkippedResponse'
              example:
                status: "SKIPPED"
                reason: "FREE_TIER_LIMIT_EXCEEDED"
                message: "오늘의 브리핑을 모두 사용했습니다."

components:
  schemas:
    ApiResponseBriefingDetail:
      type: object
      description: ApiResponse<BriefingDetailResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/BriefingDetailResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-16T11:40:00"

    ApiResponseBriefingList:
      type: object
      description: ApiResponse<BriefingListResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/BriefingListResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-16T14:30:00"

    BriefingDetailResponse:
      type: object
      properties:
        briefing_id:
          type: string
          example: "brif_01HX..."
        type:
          type: string
          enum: [SAFE, WARNING]
          description: "브리핑 유형: SAFE=안심, WARNING=주의"
          example: "SAFE"
        place_id:
          type: string
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        departure_time:
          type: string
          format: date-time
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T12:00:00"
        created_at:
          type: string
          format: date-time
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T11:40:00"
        expired:
          type: boolean
          description: 만료된 브리핑 여부 (departure_time 이후이면 true)
          example: false
        expire_message:
          type: string
          nullable: true
          description: "만료 시 '이미 지난 브리핑입니다', 미만료 시 null"
          example: null
        content:
          $ref: '#/components/schemas/BriefingContent'
        alternative_link:
          type: string
          nullable: true
          description: 주의/위험 브리핑의 대안 보기 링크
          example: null

    BriefingContent:
      type: object
      properties:
        business_status:
          type: string
          description: 영업 상태
          example: "영업 중"
        congestion:
          type: string
          description: 혼잡도
          example: "보통"
        weather:
          type: string
          description: 날씨 상태
          example: "맑음"
        travel_time:
          type: object
          properties:
            walking_minutes:
              type: integer
              description: 도보 이동시간 (분)
              example: 15
            transit_minutes:
              type: integer
              nullable: true
              description: 대중교통 이동시간 (500m 이상 시)
              example: null
            distance_m:
              type: integer
              description: 이동 거리 (미터)
              example: 420
        summary:
          type: string
          description: "총평 텍스트 (MVP: 템플릿 기반)"
          example: "현재까지 모든 항목 정상입니다. 예정대로 출발하세요."

    BriefingListResponse:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-03-16"
        briefings:
          type: array
          items:
            $ref: '#/components/schemas/BriefingListItem'

    BriefingListItem:
      type: object
      properties:
        briefing_id:
          type: string
          example: "brif_01HX..."
        type:
          type: string
          enum: [SAFE, WARNING]
          example: "SAFE"
        place_id:
          type: string
          description: 브리핑 대상 장소 ID (BriefingListItemDto에 추가된 필드)
          example: "place_abc123"
        place_name:
          type: string
          example: "이치란 라멘 시부야"
        created_at:
          type: string
          format: date-time
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T11:40:00"
        expired:
          type: boolean
          example: false

    GenerateBriefingRequest:
      type: object
      required:
        - schedule_item_id
        - place_id
        - user_id
        - departure_time
        - triggered_at
      properties:
        schedule_item_id:
          type: string
          example: "si_01HX..."
        place_id:
          type: string
          example: "place_abc123"
        user_id:
          type: string
          example: "usr_01HX..."
        departure_time:
          type: string
          format: date-time
          description: 출발 예정 시각
          example: "2026-03-16T12:00:00+09:00"
        triggered_at:
          type: string
          format: date-time
          description: 트리거 발생 시각
          example: "2026-03-16T11:40:00+09:00"

    GenerateBriefingResponse:
      type: object
      description: ApiResponse 래핑 없이 직접 반환
      properties:
        briefing_id:
          type: string
          example: "brif_01HX..."
        status:
          type: string
          enum: [CREATED, EXISTING]
          example: "CREATED"
        type:
          type: string
          enum: [SAFE, WARNING]
          nullable: true
          example: "SAFE"

    BriefingSkippedResponse:
      type: object
      description: Free 티어 한도 초과 시 plain Map으로 반환
      properties:
        status:
          type: string
          enum: [SKIPPED]
          example: "SKIPPED"
        reason:
          type: string
          enum: [FREE_TIER_LIMIT_EXCEEDED]
          example: "FREE_TIER_LIMIT_EXCEEDED"
        message:
          type: string
          example: "오늘의 브리핑을 모두 사용했습니다."

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errorCode:
          type: string
          example: "NOT_FOUND"
        errorMessage:
          type: string
          example: "브리핑을 찾을 수 없습니다."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "UNAUTHORIZED"
            errorMessage: "유효하지 않은 토큰입니다."
            timestamp: "2026-03-15T09:00:00"
    Forbidden:
      description: 접근 금지 (브리핑 소유권 없음)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "FORBIDDEN"
            errorMessage: "해당 브리핑에 접근할 권한이 없습니다."
            timestamp: "2026-03-15T09:00:00"
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "NOT_FOUND"
            errorMessage: "브리핑을 찾을 수 없습니다."
            timestamp: "2026-03-15T09:00:00"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
