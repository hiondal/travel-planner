openapi: 3.0.0
info:
  title: Place Service API
  description: 장소 검색, 상세 조회, 주변 장소 검색 서비스 API
  version: 1.0.0
  contact:
    name: travel-planner Team

servers:
  - url: https://virtserver.swaggerhub.com/travel-planner/place-service/1.0.0
    description: SwaggerHub Mock Server
  - url: https://api.travel-planner.com/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/v1
    description: Development Server

tags:
  - name: Places
    description: 장소 검색 및 조회

paths:
  /places/search:
    get:
      tags:
        - Places
      summary: 키워드 기반 장소 검색
      description: 키워드와 도시를 기준으로 장소를 검색한다. Google Places Text Search API를 호출하며, 결과는 5분간 캐싱된다. API 실패 시 DB 폴백으로 응답한다.
      operationId: searchPlaces
      x-user-story: UFR-PLCE-010
      x-controller: PlceController
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          required: true
          description: 검색 키워드 (최소 2자)
          schema:
            type: string
            minLength: 2
            example: "시부야 라멘"
        - name: city
          in: query
          required: true
          description: 검색 도시 (지원 도시 목록)
          schema:
            type: string
            example: "도쿄"
      responses:
        '200':
          description: 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceSearchResponse'
              example:
                places:
                  - place_id: "place_abc123"
                    name: "이치란 라멘 시부야"
                    address: "도쿄 시부야구 도겐자카 1-22-7"
                    rating: 4.2
                    business_hours:
                      - day: "월요일"
                        open: "11:00"
                        close: "22:00"
                    coordinates:
                      lat: 35.6595
                      lng: 139.7004
                  - place_id: "place_def456"
                    name: "후쿠로쿠 라멘"
                    address: "도쿄 시부야구 우다가와초 13-11"
                    rating: 4.0
                    business_hours:
                      - day: "월요일"
                        open: "11:30"
                        close: "21:00"
                    coordinates:
                      lat: 35.6621
                      lng: 139.6982
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /places/{place_id}:
    get:
      tags:
        - Places
      summary: 장소 상세 정보 조회
      description: 특정 장소의 영업시간, 위치, 카테고리, 평점 등 상세 정보를 조회한다. 동일 장소 재조회 시 캐시를 활용하여 API 호출을 최소화한다.
      operationId: getPlaceDetail
      x-user-story: UFR-PLCE-020
      x-controller: PlceController
      security:
        - BearerAuth: []
      parameters:
        - name: place_id
          in: path
          required: true
          description: 장소 ID
          schema:
            type: string
            example: "place_abc123"
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceDetailResponse'
              example:
                place_id: "place_abc123"
                name: "이치란 라멘 시부야"
                address: "도쿄 시부야구 도겐자카 1-22-7"
                category: "음식점"
                rating: 4.2
                business_hours:
                  - day: "월요일"
                    open: "11:00"
                    close: "22:00"
                  - day: "화요일"
                    open: "11:00"
                    close: "22:00"
                coordinates:
                  lat: 35.6595
                  lng: 139.7004
                timezone: "Asia/Tokyo"
                photo_url: "https://maps.googleapis.com/maps/api/place/photo..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/nearby:
    get:
      tags:
        - Places
      summary: 반경 기반 주변 장소 검색
      description: 특정 좌표 기준 반경 내에서 카테고리별 영업 중인 장소를 검색한다. ALTN 서비스가 대안 후보 확보를 위해 호출한다. 반경은 1km/2km/3km 단계 지정 가능.
      operationId: searchNearbyPlaces
      x-user-story: UFR-PLCE-030
      x-controller: PlceController
      security:
        - BearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          description: 기준 위도
          schema:
            type: number
            format: double
            example: 35.6595
        - name: lng
          in: query
          required: true
          description: 기준 경도
          schema:
            type: number
            format: double
            example: 139.7004
        - name: category
          in: query
          required: true
          description: 장소 카테고리
          schema:
            type: string
            example: "라멘"
        - name: radius
          in: query
          required: true
          description: 검색 반경 (미터 단위, 1000/2000/3000)
          schema:
            type: integer
            enum: [1000, 2000, 3000]
            example: 1000
      responses:
        '200':
          description: 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyPlaceSearchResponse'
              example:
                places:
                  - place_id: "place_xyz789"
                    name: "후쿠로쿠 라멘"
                    address: "도쿄 시부야구 우다가와초 13-11"
                    distance_m: 320
                    rating: 4.0
                    category: "라멘"
                    coordinates:
                      lat: 35.6621
                      lng: 139.6982
                    is_open: true
                  - place_id: "place_ghi012"
                    name: "멘야 무사시"
                    address: "도쿄 시부야구 사쿠라가오카초 1-9"
                    distance_m: 650
                    rating: 4.3
                    category: "라멘"
                    coordinates:
                      lat: 35.6571
                      lng: 139.7031
                    is_open: true
                radius_used: 1000
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

components:
  schemas:
    PlaceSearchResponse:
      type: object
      properties:
        places:
          type: array
          maxItems: 10
          description: 검색 결과 장소 목록 (최대 10개)
          items:
            $ref: '#/components/schemas/PlaceSummary'

    PlaceSummary:
      type: object
      properties:
        place_id:
          type: string
          example: "place_abc123"
        name:
          type: string
          example: "이치란 라멘 시부야"
        address:
          type: string
          example: "도쿄 시부야구 도겐자카 1-22-7"
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
          example: 4.2
        business_hours:
          type: array
          items:
            $ref: '#/components/schemas/BusinessHour'
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    PlaceDetailResponse:
      type: object
      properties:
        place_id:
          type: string
          example: "place_abc123"
        name:
          type: string
          example: "이치란 라멘 시부야"
        address:
          type: string
          example: "도쿄 시부야구 도겐자카 1-22-7"
        category:
          type: string
          description: 장소 카테고리 (음식점, 관광지, 카페 등)
          example: "음식점"
        rating:
          type: number
          format: float
          example: 4.2
        business_hours:
          type: array
          description: 요일별 영업시간
          items:
            $ref: '#/components/schemas/BusinessHour'
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        timezone:
          type: string
          description: IANA 타임존
          example: "Asia/Tokyo"
        photo_url:
          type: string
          format: uri
          example: "https://maps.googleapis.com/maps/api/place/photo..."

    NearbyPlaceSearchResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: '#/components/schemas/NearbyPlace'
        radius_used:
          type: integer
          description: 실제 사용된 검색 반경 (미터)
          example: 1000

    NearbyPlace:
      type: object
      properties:
        place_id:
          type: string
          example: "place_xyz789"
        name:
          type: string
          example: "후쿠로쿠 라멘"
        address:
          type: string
          example: "도쿄 시부야구 우다가와초 13-11"
        distance_m:
          type: integer
          description: 기준점으로부터의 도보 이동거리 (미터)
          example: 320
        rating:
          type: number
          format: float
          example: 4.0
        category:
          type: string
          example: "라멘"
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        is_open:
          type: boolean
          description: 현재 영업 중 여부
          example: true

    BusinessHour:
      type: object
      properties:
        day:
          type: string
          example: "월요일"
        open:
          type: string
          pattern: '^[0-2][0-9]:[0-5][0-9]$'
          example: "11:00"
        close:
          type: string
          pattern: '^[0-2][0-9]:[0-5][0-9]$'
          example: "22:00"

    Coordinates:
      type: object
      properties:
        lat:
          type: number
          format: double
          example: 35.6595
        lng:
          type: number
          format: double
          example: 139.7004

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "요청한 리소스를 찾을 수 없습니다."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00Z"

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "BAD_REQUEST"
            message: "검색어는 최소 2자 이상이어야 합니다."
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "UNAUTHORIZED"
            message: "유효하지 않은 토큰입니다."
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "NOT_FOUND"
            message: "장소를 찾을 수 없습니다."
    ServiceUnavailable:
      description: 외부 API 장애
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "SERVICE_UNAVAILABLE"
            message: "장소 검색 서비스가 일시적으로 사용 불가합니다."

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
