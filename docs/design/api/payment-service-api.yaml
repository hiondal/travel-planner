openapi: 3.0.0
info:
  title: Payment Service API
  description: 구독 구매, 구독 상태 조회 서비스 API
  version: 1.0.0
  contact:
    name: travel-planner Team

servers:
  - url: https://virtserver.swaggerhub.com/travel-planner/payment-service/1.0.0
    description: SwaggerHub Mock Server
  - url: https://api.travel-planner.com/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/v1
    description: Development Server

tags:
  - name: Subscriptions
    description: 구독 플랜 조회 및 구매

paths:
  /subscriptions/plans:
    get:
      tags:
        - Subscriptions
      summary: 구독 플랜 목록 조회
      description: 이용 가능한 구독 플랜(Trip Pass, Pro)의 가격과 혜택을 조회한다. Paywall 화면에서 표시되는 플랜 정보.
      operationId: getSubscriptionPlans
      x-user-story: UFR-PAY-010
      x-controller: PayController
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 플랜 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlansResponse'
              example:
                plans:
                  - plan_id: "plan_trip_pass"
                    name: "Trip Pass"
                    tier: "TRIP_PASS"
                    price:
                      amount: 4900
                      currency: "KRW"
                      period: "1회"
                    features:
                      - "대안 카드 기능 이용"
                      - "무제한 브리핑"
                    apple_product_id: "com.travel-planner.trippass"
                    google_product_id: "travel_planner_trippass"
                  - plan_id: "plan_pro"
                    name: "Pro"
                    tier: "PRO"
                    price:
                      amount: 9900
                      currency: "KRW"
                      period: "월"
                    features:
                      - "대안 카드 기능 이용"
                      - "무제한 브리핑"
                      - "AI 컨시어지 가이드"
                      - "우선 지원"
                    apple_product_id: "com.travel-planner.pro.monthly"
                    google_product_id: "travel_planner_pro_monthly"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /subscriptions/purchase:
    post:
      tags:
        - Subscriptions
      summary: 구독 구매 (인앱 결제 영수증 검증)
      description: |
        Apple IAP / Google Play Billing 인앱 결제 완료 후 영수증을 서버에서 검증하고 구독 티어를 즉시 변경한다.
        - Circuit Breaker + Retry 패턴으로 결제 Gateway 장애에 대응한다.
        - 구독 티어 변경 후 기존 Access Token을 즉시 무효화하고 새 토큰을 발급한다.
        - 결제 이력이 payment_records에 저장된다.
      operationId: purchaseSubscription
      x-user-story: UFR-PAY-010
      x-controller: PayController
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseRequest'
            examples:
              apple:
                summary: Apple IAP 구매
                value:
                  plan_id: "plan_trip_pass"
                  receipt: "MIIT3QYJKoZIhvcNAQcCoIIT..."
                  provider: "apple"
              google:
                summary: Google Play 구매
                value:
                  plan_id: "plan_pro"
                  receipt: "eyJwdXJjaGFzZVRva2VuIjoiQUV1aHA0Li4uIn0="
                  provider: "google"
      responses:
        '201':
          description: 구독 구매 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseResponse'
              example:
                subscription_id: "sub_01HX..."
                tier: "TRIP_PASS"
                status: "ACTIVE"
                started_at: "2026-03-16T10:00:00Z"
                expires_at: null
                new_access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                activated_features:
                  - "대안 카드 기능 이용"
                  - "무제한 브리핑"
        '402':
          description: 결제 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "PAYMENT_VERIFICATION_FAILED"
                message: "결제에 실패했습니다. 다시 시도해주세요."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /subscriptions/status:
    get:
      tags:
        - Subscriptions
      summary: 구독 상태 조회
      description: 현재 사용자의 구독 상태와 티어 정보를 조회한다. 설정 화면에서 구독 상태 확인에 사용.
      operationId: getSubscriptionStatus
      x-user-story: UFR-PAY-010
      x-controller: PayController
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 구독 상태 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionStatusResponse'
              examples:
                free:
                  summary: Free 티어
                  value:
                    tier: "FREE"
                    status: "ACTIVE"
                    subscription_id: null
                    started_at: null
                    expires_at: null
                trip_pass:
                  summary: Trip Pass (일회성)
                  value:
                    tier: "TRIP_PASS"
                    status: "ACTIVE"
                    subscription_id: "sub_01HX..."
                    started_at: "2026-03-16T10:00:00Z"
                    expires_at: null
                pro:
                  summary: Pro (월정액, 해지 예정)
                  value:
                    tier: "PRO"
                    status: "CANCELLING"
                    subscription_id: "sub_02HX..."
                    started_at: "2026-02-01T00:00:00Z"
                    expires_at: "2026-04-01T00:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    SubscriptionPlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'

    SubscriptionPlan:
      type: object
      properties:
        plan_id:
          type: string
          example: "plan_trip_pass"
        name:
          type: string
          example: "Trip Pass"
        tier:
          type: string
          enum: [TRIP_PASS, PRO]
          example: "TRIP_PASS"
        price:
          type: object
          properties:
            amount:
              type: integer
              example: 4900
            currency:
              type: string
              example: "KRW"
            period:
              type: string
              description: 결제 주기 (1회/월/년)
              example: "1회"
        features:
          type: array
          items:
            type: string
          example:
            - "대안 카드 기능 이용"
            - "무제한 브리핑"
        apple_product_id:
          type: string
          description: Apple IAP 제품 ID
          example: "com.travel-planner.trippass"
        google_product_id:
          type: string
          description: Google Play 제품 ID
          example: "travel_planner_trippass"

    PurchaseRequest:
      type: object
      required:
        - plan_id
        - receipt
        - provider
      properties:
        plan_id:
          type: string
          description: 구독 플랜 ID
          example: "plan_trip_pass"
        receipt:
          type: string
          description: 인앱 결제 영수증 데이터
          example: "MIIT3QYJKoZIhvcNAQcCoIIT..."
        provider:
          type: string
          enum: [apple, google]
          description: 결제 제공자
          example: "apple"

    PurchaseResponse:
      type: object
      properties:
        subscription_id:
          type: string
          example: "sub_01HX..."
        tier:
          type: string
          enum: [TRIP_PASS, PRO]
          example: "TRIP_PASS"
        status:
          type: string
          enum: [ACTIVE, CANCELLED, CANCELLING]
          example: "ACTIVE"
        started_at:
          type: string
          format: date-time
          example: "2026-03-16T10:00:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 만료 일시 (해지 예정 시 또는 기간제 구독)
          example: null
        new_access_token:
          type: string
          description: 구독 티어 반영된 새 JWT Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        activated_features:
          type: array
          description: 활성화된 기능 목록
          items:
            type: string
          example:
            - "대안 카드 기능 이용"
            - "무제한 브리핑"

    SubscriptionStatusResponse:
      type: object
      properties:
        tier:
          type: string
          enum: [FREE, TRIP_PASS, PRO]
          example: "TRIP_PASS"
        status:
          type: string
          enum: [ACTIVE, CANCELLED, CANCELLING]
          example: "ACTIVE"
        subscription_id:
          type: string
          nullable: true
          example: "sub_01HX..."
        started_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-16T10:00:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 해지 예정 시 또는 기간제 구독의 만료 일시
          example: null

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "PAYMENT_VERIFICATION_FAILED"
        message:
          type: string
          example: "결제에 실패했습니다. 다시 시도해주세요."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00Z"

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "BAD_REQUEST"
            message: "plan_id 또는 receipt가 유효하지 않습니다."
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "UNAUTHORIZED"
            message: "유효하지 않은 토큰입니다."
    ServiceUnavailable:
      description: 결제 Gateway 장애 (Circuit Breaker OPEN)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "SERVICE_UNAVAILABLE"
            message: "결제 서비스가 일시적으로 이용 불가합니다. 잠시 후 다시 시도해주세요."

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
