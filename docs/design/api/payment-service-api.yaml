openapi: 3.0.0
info:
  title: Payment Service API
  description: 구독 구매, 구독 상태 조회 서비스 API
  version: 1.1.0
  contact:
    name: travel-planner Team

servers:
  - url: http://localhost:8087/api/v1
    description: Local Development
  - url: https://api.travel-planner.com/api/v1
    description: Production Server
  - url: https://dev-api.travel-planner.com/api/v1
    description: Development Server

tags:
  - name: Subscriptions
    description: 구독 플랜 조회 및 구매

paths:
  /subscriptions/plans:
    get:
      tags:
        - Subscriptions
      summary: 구독 플랜 목록 조회
      description: |
        이용 가능한 구독 플랜(Trip Pass, Pro)의 가격과 혜택을 조회한다.
        Paywall 화면에서 표시되는 플랜 정보.
        인증 없이 호출 가능하다 (security 없음).
        응답은 ApiResponse<SubscriptionPlansResponse> 래핑 구조로 반환된다.
      operationId: getSubscriptionPlans
      x-user-story: UFR-PAY-010
      x-controller: PayController
      responses:
        '200':
          description: 플랜 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSubscriptionPlans'
              example:
                success: true
                data:
                  plans:
                    - plan_id: "plan_trip_pass"
                      name: "Trip Pass"
                      tier: "TRIP_PASS"
                      price:
                        amount: 4900
                        currency: "KRW"
                        period: "1회"
                      features:
                        - "대안 카드 기능 이용"
                        - "무제한 브리핑"
                      apple_product_id: "com.travel-planner.trippass"
                      google_product_id: "travel_planner_trippass"
                    - plan_id: "plan_pro"
                      name: "Pro"
                      tier: "PRO"
                      price:
                        amount: 9900
                        currency: "KRW"
                        period: "월"
                      features:
                        - "대안 카드 기능 이용"
                        - "무제한 브리핑"
                        - "AI 컨시어지 가이드"
                        - "우선 지원"
                      apple_product_id: "com.travel-planner.pro.monthly"
                      google_product_id: "travel_planner_pro_monthly"
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-15T09:00:00"

  /subscriptions/purchase:
    post:
      tags:
        - Subscriptions
      summary: 구독 구매 (인앱 결제 영수증 검증)
      description: |
        Apple IAP / Google Play Billing 인앱 결제 완료 후 영수증을 서버에서 검증하고
        구독 티어를 즉시 변경한다.
        - 인증 필요 (BearerAuth). 인증 정보 없으면 401 반환.
        - 구독 티어 변경 후 기존 Access Token을 즉시 무효화하고 새 토큰을 발급한다.
        - 응답은 ApiResponse<PurchaseResponse> 래핑 구조로 201 반환.
      operationId: purchaseSubscription
      x-user-story: UFR-PAY-010
      x-controller: PayController
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseRequest'
            examples:
              apple:
                summary: Apple IAP 구매
                value:
                  plan_id: "plan_trip_pass"
                  receipt: "MIIT3QYJKoZIhvcNAQcCoIIT..."
                  provider: "apple"
              google:
                summary: Google Play 구매
                value:
                  plan_id: "plan_pro"
                  receipt: "eyJwdXJjaGFzZVRva2VuIjoiQUV1aHA0Li4uIn0="
                  provider: "google"
      responses:
        '201':
          description: 구독 구매 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePurchase'
              example:
                success: true
                data:
                  subscription_id: "sub_01HX..."
                  tier: "TRIP_PASS"
                  status: "ACTIVE"
                  started_at: "2026-03-16T10:00:00"
                  expires_at: null
                  new_access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  activated_features:
                    - "대안 카드 기능 이용"
                    - "무제한 브리핑"
                errorCode: null
                errorMessage: null
                timestamp: "2026-03-16T10:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: 결제 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                errorCode: "PAYMENT_VERIFICATION_FAILED"
                errorMessage: "결제에 실패했습니다. 다시 시도해주세요."
                timestamp: "2026-03-16T10:00:00"
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /subscriptions/status:
    get:
      tags:
        - Subscriptions
      summary: 구독 상태 조회
      description: |
        현재 사용자의 구독 상태와 티어 정보를 조회한다.
        두 가지 호출 방식을 지원한다:

        **외부 호출 (클라이언트)**: JWT Bearer 인증으로 호출. userId 파라미터 불필요.

        **내부 서비스 호출**: `userId` 쿼리 파라미터 + `X-Internal-Service-Key` 헤더로 호출.
        내부 서비스 키가 없거나 불일치하면 401 반환 (ApiResponse 래핑 구조).

        응답은 ApiResponse<SubscriptionStatusResponse> 래핑 구조로 반환된다.
      operationId: getSubscriptionStatus
      x-user-story: UFR-PAY-010
      x-controller: PayController
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          description: 내부 서비스 호출 시 대상 사용자 ID (외부 호출 시 불필요)
          schema:
            type: string
            example: "usr_01HX..."
        - name: X-Internal-Service-Key
          in: header
          required: false
          description: 내부 서비스 간 호출용 API 키 (userId 파라미터와 함께 사용)
          schema:
            type: string
      responses:
        '200':
          description: 구독 상태 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSubscriptionStatus'
              examples:
                free:
                  summary: Free 티어
                  value:
                    success: true
                    data:
                      tier: "FREE"
                      status: "ACTIVE"
                      subscription_id: null
                      started_at: null
                      expires_at: null
                    errorCode: null
                    errorMessage: null
                    timestamp: "2026-03-16T10:00:00"
                trip_pass:
                  summary: Trip Pass (일회성)
                  value:
                    success: true
                    data:
                      tier: "TRIP_PASS"
                      status: "ACTIVE"
                      subscription_id: "sub_01HX..."
                      started_at: "2026-03-16T10:00:00"
                      expires_at: null
                    errorCode: null
                    errorMessage: null
                    timestamp: "2026-03-16T10:00:00"
                pro:
                  summary: Pro (월정액, 해지 예정)
                  value:
                    success: true
                    data:
                      tier: "PRO"
                      status: "CANCELLING"
                      subscription_id: "sub_02HX..."
                      started_at: "2026-02-01T00:00:00"
                      expires_at: "2026-04-01T00:00:00"
                    errorCode: null
                    errorMessage: null
                    timestamp: "2026-03-16T10:00:00"
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    ApiResponseSubscriptionPlans:
      type: object
      description: ApiResponse<SubscriptionPlansResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/SubscriptionPlansResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

    ApiResponsePurchase:
      type: object
      description: ApiResponse<PurchaseResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/PurchaseResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-16T10:00:00"

    ApiResponseSubscriptionStatus:
      type: object
      description: ApiResponse<SubscriptionStatusResponse> 래핑 구조
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/SubscriptionStatusResponse'
        errorCode:
          type: string
          nullable: true
          example: null
        errorMessage:
          type: string
          nullable: true
          example: null
        timestamp:
          type: string
          format: date-time
          example: "2026-03-16T10:00:00"

    SubscriptionPlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'

    SubscriptionPlan:
      type: object
      properties:
        plan_id:
          type: string
          example: "plan_trip_pass"
        name:
          type: string
          example: "Trip Pass"
        tier:
          type: string
          enum: [TRIP_PASS, PRO]
          example: "TRIP_PASS"
        price:
          type: object
          properties:
            amount:
              type: integer
              example: 4900
            currency:
              type: string
              example: "KRW"
            period:
              type: string
              description: 결제 주기 (1회/월/년)
              example: "1회"
        features:
          type: array
          items:
            type: string
          example:
            - "대안 카드 기능 이용"
            - "무제한 브리핑"
        apple_product_id:
          type: string
          description: Apple IAP 제품 ID
          example: "com.travel-planner.trippass"
        google_product_id:
          type: string
          description: Google Play 제품 ID
          example: "travel_planner_trippass"

    PurchaseRequest:
      type: object
      required:
        - plan_id
        - receipt
        - provider
      properties:
        plan_id:
          type: string
          description: 구독 플랜 ID
          example: "plan_trip_pass"
        receipt:
          type: string
          description: 인앱 결제 영수증 데이터
          example: "MIIT3QYJKoZIhvcNAQcCoIIT..."
        provider:
          type: string
          enum: [apple, google]
          description: 결제 제공자
          example: "apple"

    PurchaseResponse:
      type: object
      properties:
        subscription_id:
          type: string
          example: "sub_01HX..."
        tier:
          type: string
          enum: [TRIP_PASS, PRO]
          example: "TRIP_PASS"
        status:
          type: string
          enum: [ACTIVE, CANCELLED, CANCELLING]
          example: "ACTIVE"
        started_at:
          type: string
          format: date-time
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T10:00:00"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 만료 일시 (해지 예정 시 또는 기간제 구독, LocalDateTime 직렬화)
          example: null
        new_access_token:
          type: string
          description: 구독 티어 반영된 새 JWT Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        activated_features:
          type: array
          description: 활성화된 기능 목록
          items:
            type: string
          example:
            - "대안 카드 기능 이용"
            - "무제한 브리핑"

    SubscriptionStatusResponse:
      type: object
      properties:
        tier:
          type: string
          enum: [FREE, TRIP_PASS, PRO]
          example: "TRIP_PASS"
        status:
          type: string
          enum: [ACTIVE, CANCELLED, CANCELLING]
          example: "ACTIVE"
        subscription_id:
          type: string
          nullable: true
          example: "sub_01HX..."
        started_at:
          type: string
          format: date-time
          nullable: true
          description: LocalDateTime으로 직렬화 (timezone 없음)
          example: "2026-03-16T10:00:00"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: 해지 예정 시 또는 기간제 구독의 만료 일시 (LocalDateTime 직렬화)
          example: null

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errorCode:
          type: string
          example: "PAYMENT_VERIFICATION_FAILED"
        errorMessage:
          type: string
          example: "결제에 실패했습니다. 다시 시도해주세요."
        timestamp:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00"

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "BAD_REQUEST"
            errorMessage: "plan_id 또는 receipt가 유효하지 않습니다."
            timestamp: "2026-03-15T09:00:00"
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "UNAUTHORIZED"
            errorMessage: "유효하지 않은 토큰입니다."
            timestamp: "2026-03-15T09:00:00"
    ServiceUnavailable:
      description: 결제 Gateway 장애
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errorCode: "SERVICE_UNAVAILABLE"
            errorMessage: "결제 서비스가 일시적으로 이용 불가합니다. 잠시 후 다시 시도해주세요."
            timestamp: "2026-03-15T09:00:00"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
