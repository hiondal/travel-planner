spring:
  application:
    name: place-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/place
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:P@ssw0rd$}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

server:
  port: ${SERVER_PORT:8083}

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: ${GOOGLE_PLACES_BASE_URL:https://maps.googleapis.com/maps/api}

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.travelplanner.place: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/place.log}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_ROLLING_FILE_PATTERN:logs/place.%d{yyyy-MM-dd}.%i.log}
      max-file-size: ${LOG_MAX_FILE_SIZE:100MB}
      max-history: ${LOG_MAX_HISTORY:30}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}
