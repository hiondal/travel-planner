spring:
  application:
    name: place-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 0

google:
  places:
    api-key: test-api-key
    base-url: http://localhost:8089

logging:
  level:
    com.travelplanner.place: DEBUG
